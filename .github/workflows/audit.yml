name: Weekly audit

on:
  schedule:
    # Sunday 19:00 UTC = 20:00 Prague (winter) / 21:00 Prague (summer)
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run audit
        run: npx tsx scripts/audit/run.ts

      - name: Open or update audit issue
        id: audit_issue
        if: hashFiles('/tmp/audit-issue.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Týdenní audit ${DATE}"

          # Ensure 'audit' label exists (no-op if already present)
          gh label create audit --description "Weekly audit report" --color FBCA04 2>/dev/null || true

          # Is there already an open audit issue? Reuse/update it to avoid duplicates.
          EXISTING=$(gh issue list --label audit --state open --json number --jq '.[0].number // ""')
          if [ -n "$EXISTING" ]; then
            echo "Updating existing audit issue #${EXISTING}"
            gh issue edit "$EXISTING" --title "$TITLE" --body-file /tmp/audit-issue.md
            gh issue comment "$EXISTING" --body "↻ Audit rerun $(date -u +%Y-%m-%dT%H:%MZ) — issue body updated."
            ISSUE_NUM="$EXISTING"
          else
            echo "Creating new audit issue"
            URL=$(gh issue create \
              --title "$TITLE" \
              --body-file /tmp/audit-issue.md \
              --label audit)
            ISSUE_NUM=$(basename "$URL")
          fi
          echo "issue_number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Telegram alert (problems found)
        if: hashFiles('/tmp/audit-issue.md') != ''
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          ISSUE_NUM: ${{ steps.audit_issue.outputs.issue_number }}
        run: |
          if [ -z "$TG_BOT" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets not set — skipping notification"
            exit 0
          fi
          COUNT=$(grep -cE '^## [0-9]+\. ' /tmp/audit-issue.md || echo "?")
          NOUN="problémů"
          [ "$COUNT" = "1" ] && NOUN="problém"
          [[ "$COUNT" =~ ^[2-4]$ ]] && NOUN="problémy"
          MSG="⚠️ *Týdenní audit našel ${COUNT} ${NOUN}*

Projdi a zaškrtni /fix:
https://github.com/davidnavratil/davidnavratil.com/issues/${ISSUE_NUM}"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" > /dev/null
          echo "✓ Telegram alert sent"

      - name: Report clean
        if: hashFiles('/tmp/audit-issue.md') == ''
        run: echo "✓ Audit passed — no problems found."
