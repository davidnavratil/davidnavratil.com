name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Automatic daily rebuild at 6:00 UTC (8:00 CET) to fetch latest Substack articles
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 77.42.84.152 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update RSS cache
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: node scripts/update-rss-cache.mjs

      - name: Commit updated cache
        run: |
          git diff --quiet src/data/articles-cache.json 2>/dev/null && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles-cache.json
          git commit -m "chore: update RSS articles cache [skip ci]"
          git push

      - run: npm run build

      - name: Deploy via rsync
        run: |
          # Dynamically exclude all analysis subdirectories on the server
          EXCLUDES=$(ssh root@77.42.84.152 "ls -1 /var/www/davidnavratil.com/analyses/ 2>/dev/null" \
            | while read -r dir; do [ -n "$dir" ] && echo "--exclude=analyses/${dir}/"; done)
          echo "Auto-excluded: $EXCLUDES"
          rsync -avz --delete \
            -e ssh \
            $EXCLUDES \
            dist/ root@77.42.84.152:/var/www/davidnavratil.com/

      - name: Update CSP hashes in nginx
        run: node scripts/update-csp-hashes.mjs
