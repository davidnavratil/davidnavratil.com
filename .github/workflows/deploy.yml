name: Deploy to production

on:
  push:
    branches: [main]
  schedule:
    # Automatic daily rebuild at 6:00 UTC (8:00 CET) to fetch latest Substack articles
    - cron: '0 6 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Update RSS cache
        run: node scripts/update-rss-cache.mjs

      - name: Commit updated cache
        run: |
          git diff --quiet src/data/articles-cache.json 2>/dev/null && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/articles-cache.json
          git commit -m "chore: update RSS articles cache [skip ci]"
          git push

      - run: npm run build

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 77.42.84.152 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude='analyses/hormuz/' \
            --exclude='analyses/ree-dashboard/' \
            --exclude='analyses/uzka-hrdla/' \
            dist/ root@77.42.84.152:/var/www/davidnavratil.com/
