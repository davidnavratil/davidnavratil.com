name: Weekly summary

on:
  schedule:
    # Sunday 18:00 UTC = 19 CET (winter) / 20 CEST (summer) — after the weekly audit
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build weekly summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: npx tsx scripts/dashboard/weekly-summary.ts

      - name: Send to Telegram
        env:
          TG_BOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT" ] || [ -z "$TG_CHAT" ]; then
            echo "Telegram secrets not set — skipping notification"
            exit 0
          fi
          MSG=$(cat /tmp/weekly-summary.txt)
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "parse_mode=Markdown" \
            --data-urlencode "disable_web_page_preview=true" > /dev/null
          echo "✓ Weekly summary sent"
