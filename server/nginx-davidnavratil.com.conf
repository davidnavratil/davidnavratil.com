server {
    listen 80;
    listen [::]:80;
    server_name davidnavratil.com www.davidnavratil.com;

    location /.well-known/acme-challenge/ {
        server_tokens off;

    root /var/www/davidnavratil.com;
    }

    location / {
        return 301 https://davidnavratil.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.davidnavratil.com;

    ssl_certificate /etc/letsencrypt/live/davidnavratil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidnavratil.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://davidnavratil.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name davidnavratil.com;

    ssl_certificate /etc/letsencrypt/live/davidnavratil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davidnavratil.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    root /var/www/davidnavratil.com;
    index index.html;

    # Custom error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-VxSGNho5/ZNAyivAQ3yET59wMfYqpzyjDDMo4z0sd20=' 'sha256-dQXHTlYdUepc77HeFrmY0YgeqLymngECSlHy2uE/Tt0=' 'sha256-MHlUrpiGoDr7DVlynT2qJmSWoDDQ9t8iymygAG3p6cQ=' 'sha256-YcDYCN6+hL6qwWlc/Ls3mruhrsy9hvXeWS/u0qSjTxo=' 'sha256-jDH+nqA5+AosjWSlfp75dFqmPo5cN17i5VzDCT6LHdc=' 'sha256-a3sY+wMaB/TeEsCimVzMhg9QX5j4Fx5ClDvYU+i/ZhU=' 'sha256-wfHP/syTsLZeeGfMKZIOPCBxmX/BIs88BrzqADO9jPA=' 'sha256-8w4bWNf2kRBeVwzE3LPVnyA+Ym2KF2S7ZEBM82/3J3k='; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://substackcdn.com; font-src 'self'; connect-src 'self' https://plausible.io; frame-src 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    # Block dotfiles (except .well-known)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }


    # Astro hashed assets — aggressive cache
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images — cache 30 days
    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }


    # Fonts — cache 1 year (immutable woff2)
    location ~* \.woff2?$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML — short cache with revalidation
    location ~* \.html$ {
        expires 10m;
        add_header Cache-Control "public, must-revalidate";
    }

    # JS — cache 30 days
    location /js/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Analysis modules
    location /analyses/ {
        try_files $uri $uri.html $uri/ $uri/index.html =404;
    }

    # Clean URLs
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
